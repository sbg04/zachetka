{% extends "base.html" %}
{% block title %}Профиль — Зачётка{% endblock %}
{% block content %}
<div class="profile-page">
  <div class="profile-wrap">
    <div class="profile-head">
      <div class="profile-ava">🎓</div>
      <h2>{{ current_user.name }}</h2>
      <p>{{ current_user.email }}</p>
      <p style="margin-top:4px;opacity:.5;font-size:.75rem">Аккаунт с {{ current_user.created_at.strftime('%d.%m.%Y') }}</p>
    </div>
    <div class="profile-body">
      <form method="POST">
        <div class="form-group"><label>Имя</label><input type="text" name="name" value="{{ current_user.name }}" required></div>
        <div class="form-group"><label>Email</label><input type="email" value="{{ current_user.email }}" disabled style="opacity:.5;cursor:not-allowed"></div>
        <div class="form-group"><label>Телефон</label><input type="tel" name="phone" value="{{ current_user.phone or '' }}" placeholder="+7 999 000-00-00"></div>
        <button type="submit" class="btn-submit">Сохранить</button>
      </form>
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--gray-border);display:flex;justify-content:space-between;align-items:center">
        <a href="{{ url_for('dashboard') }}" style="color:var(--blue-mid);font-weight:700;font-size:.875rem">← Личный кабинет</a>
        <a href="{{ url_for('logout') }}" style="color:#EF4444;font-weight:700;font-size:.875rem">Выйти</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
