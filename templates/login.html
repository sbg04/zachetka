{% extends "base.html" %}
{% block title %}Войти — Зачётка{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-top">
      <div class="auth-top-icon">📓</div>
      <h1>Добро пожаловать</h1>
      <p>Войдите в личный кабинет</p>
    </div>
    <form method="POST">
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="student@mail.ru" required></div>
      <div class="form-group"><label>Пароль</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn-submit">Войти →</button>
    </form>
    <div class="auth-switch">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></div>
  </div>
</div>
{% endblock %}
