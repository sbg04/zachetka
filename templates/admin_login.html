{% extends "base.html" %}
{% block title %}Админ — Зачётка{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="background:linear-gradient(135deg,#EF4444,#B91C1C)">🔐</div>
      <h1>Админ-панель</h1>
      <p>Вход только для администраторов</p>
    </div>
    <form method="POST">
      <div class="fg"><label>Логин</label><input type="text" name="login" placeholder="admin" required></div>
      <div class="fg"><label>Пароль</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn-sub" style="background:linear-gradient(135deg,#EF4444,#B91C1C)">Войти в панель →</button>
    </form>
  </div>
</div>
{% endblock %}
